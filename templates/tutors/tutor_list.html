{extends "base.html"}

{% block title %}Tutor List{% endblock %}

{% block content %

<h1>Our Tutors</h1>

<ul>
    {% for tutor in tutors %}
        <li>
            <a href="{% url 'tutors:tutor_detail' tutor.pk %}">
                {{ tutor.display_name }}
            </a>
        </li>
    {% empty %}
        <li>No tutors available at the moment.</li>
</ul>
    {% endfor %}
